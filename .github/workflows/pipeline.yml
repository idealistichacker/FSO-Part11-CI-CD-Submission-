name: Exercise5 v1.0             # 这里的名字会显示在 Actions 界面上

on:
  push:                       # 触发条件：当你执行 git push 时
    branches:
      - main      

jobs:
  simple_deployment_pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          
      - name: Install dependencies 
        run: npm install  

      - name: Check style        
        run: npm run eslint

      - name: Run npm test
        run: npm test